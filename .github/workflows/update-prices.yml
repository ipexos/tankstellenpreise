name: Spritpreise aktualisieren

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Preise abrufen
        env:
          TANKERKOENIG_API_KEY: ${{ secrets.TANKERKOENIG_API_KEY }}
        run: python scripts/fetch_prices.py

      - name: Daten committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --cached --quiet || git commit -m "Preise aktualisiert: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
